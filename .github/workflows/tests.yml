name: Tests

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: ${{ github.ref }}-${{ github.workflow }}-${{ github.event_name }}-${{ github.event_name != 'pull_request' && github.sha || '' }}
  cancel-in-progress: true

jobs:
  quality:
    name: Quality
    runs-on: ubuntu-latest
    steps:
      - name: Permission proof - non-mutating
        if: github.event_name == 'pull_request'
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          PROOF_REF: refs/heads/actions-permission-proof-${{ github.run_id }}
        run: |
          set -euo pipefail

          echo "Repository: $REPO"
          echo "Event: $GITHUB_EVENT_NAME"
          echo "Actor: $GITHUB_ACTOR"
          echo "Testing whether GITHUB_TOKEN can reach a contents-write endpoint."
          echo "This request intentionally uses an invalid SHA, so it cannot create a branch."

          status=$(curl -sS -o /tmp/create_ref_response.json -w "%{http_code}" \
            -X POST \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/$REPO/git/refs" \
            -d "{\"ref\":\"$PROOF_REF\",\"sha\":\"0000000000000000000000000000000000000000\"}")

          echo "create_ref_http_status=$status"
          cat /tmp/create_ref_response.json

          if [ "$status" = "403" ]; then
            echo "Result: GITHUB_TOKEN is read-only or blocked for this pull_request context."
          elif [ "$status" = "422" ]; then
            echo "::warning::Result: request reached the write endpoint and failed validation as expected."
          else
            echo "::warning::Result: unexpected status from write-endpoint probe."
          fi
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.x"
          cache: pip
      - name: Install dependencies
        run: |
          python -m pip install -U pip 
          python -m pip install -e '.[dev]'
      - name: Check
        run: ./check.sh

  documentation:
    name: Documentation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.x"
          cache: pip
      - name: Install dependencies
        run: |
          python -m pip install -U pip
          python -m pip install -e '.[docs]'
      - name: Build
        run: |
          sphinx-build -d docs docs/source docs_out --color -W -bhtml

  tests:
    name: "${{ matrix.os.emoji }} ${{ matrix.python.name }}"
    runs-on: ${{ matrix.os.runs-on }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - emoji: 🐧
            runs-on: [ubuntu-latest]
          - emoji: 🍎
            runs-on: [macos-latest]
          - emoji: 🪟
            runs-on: [windows-latest]
        python:
          - name: CPython 3.10
            runs-on: "3.10"
          - name: CPython 3.11
            runs-on: "3.11"
          - name: CPython 3.12
            runs-on: "3.12"
          - name: CPython 3.13
            runs-on: "3.13"
          - name: CPython 3.14
            runs-on: "3.14-dev"
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python.runs-on }}
          cache: pip
          check-latest: true
      - name: Install dependencies
        run: |
          python -m pip install -U pip
          python -m pip install -e '.[dev,tests]'
      - name: Tests (GNU/Linux)
        if: matrix.os.emoji == '🐧'
        run: xvfb-run python -m pytest
      - name: Tests (macOS, Windows)
        if: matrix.os.emoji != '🐧'
        run: python -m pytest

  automerge:
    name: Automerge
    runs-on: ubuntu-latest
    needs: [documentation, quality, tests]
    if: ${{ github.actor == 'dependabot[bot]' }}
    steps:
      - name: Automerge
        run: gh pr merge --auto --rebase "$PR_URL"
        env:
          PR_URL: ${{github.event.pull_request.html_url}}
          GITHUB_TOKEN: ${{secrets.GITHUB_TOKEN}}
